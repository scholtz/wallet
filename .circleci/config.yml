version: 2.1

workflows:
  build:
    jobs:
      - test-job

jobs:
  test-job:
    docker:
      - image: cimg/node:26.0.0-browsers  # Use image with browsers for Cypress
    steps:
      - checkout
      - run:
          name: Install pnpm
          command: npm install -g pnpm@11.10.0
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile
      - run:
          name: Build application
          command: pnpm run build
      - run:
          name: Run tests with intelligent runner
          command: pnpm run test
      - store_artifacts:
          path: cypress/videos
      - store_artifacts:
          path: cypress/screenshots
